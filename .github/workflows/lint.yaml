name: "Linting and formatting on PR"

on:
  pull_request:
    branches:
      - "**"

jobs:
  Continuous-Integration:
    name: "Performing linting and formatting"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "pnpm"

      - name: Enable corepack & install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@8.14.0 --activate

      - name: Install dependencies with pnpm
        run: pnpm install

      - name: Run formatting
        run: pnpm run format:write
